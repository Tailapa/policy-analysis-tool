services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    # Host port bumped to 8010 (was 8000) to dodge a leaked/orphaned socket
    # on this machine still squatting 127.0.0.1:8000 outside Docker's
    # control (survives `docker compose down` and `wsl --shutdown` — likely
    # from an earlier crashed `uvicorn --reload` run). Container-internal
    # port stays 8000, so nothing else needs to change. Revert to
    # "8000:8000" once the host is rebooted and the leak clears.
    ports: ["8010:8000"]
    env_file: ./backend/.env
    volumes:
      - ./data:/data:ro
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports: ["3000:3000"]
    environment:
      # The frontend is a client-side Vite SPA: fetches run in the user's
      # browser, not inside the compose network, so this must be a
      # host-reachable URL (localhost:8000, via the backend's published
      # port) rather than the internal service DNS name "backend" that
      # backend-spec.md §7's server-rendered-framework example uses.
      - VITE_API_BASE_URL=http://localhost:8010
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
