app = 'india-governance-watch'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.frontend.prod'

  [build.args]
    VITE_API_BASE_URL = 'https://india-governance-watch-api.fly.dev'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
